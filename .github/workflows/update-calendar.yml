name: Update World Cup Calendar

# Triggered externally via cron-job.org set to every 10 minutes:
#   POST https://api.github.com/repos/YOUR-USERNAME/YOUR-REPO/actions/workflows/update-calendar.yml/dispatches
# with body: {"ref":"main"}
# and header: Authorization: Bearer YOUR_GITHUB_PAT
#
# Why not GitHub's built-in schedule trigger? GitHub freely admits scheduled
# workflows can be delayed by hours or skipped entirely on inactive repos.
# An external HTTP cron service is far more reliable.
# See README for setup instructions.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate calendar
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/generate_calendar.py

      - name: Commit and push if the calendar changed
        run: |
          git config user.name "world-cup-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/world-cup-2026-group-stage.ics docs/index.html
          git diff --staged --quiet || git commit -m "Auto-update calendar: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
