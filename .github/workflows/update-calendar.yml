name: Update World Cup Calendar

on:
  schedule:
    # Hourly. football-data.org's free tier is 10 requests/minute, and this
    # job makes 2 calls per run (matches + standings) -- plenty of headroom
    # even at this frequency. Go more frequent if you want (e.g. every 15
    # min: '*/15 * * * *'); the rate limit here just isn't a binding
    # constraint the way it was on the API-Football free tier.
    - cron: '0 * * * *'
  workflow_dispatch: {}   # lets you trigger a manual refresh from the Actions tab

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate calendar
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/generate_calendar.py

      - name: Commit and push if the calendar changed
        run: |
          git config user.name "world-cup-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/world-cup-2026-group-stage.ics
          git diff --staged --quiet || git commit -m "Auto-update calendar: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
